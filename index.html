      if (s && !(sampleStore[s.url] && sampleStore[s.url].buffer)){
        decodeSample(s.url).then(play, play);
      } else {
        play();
      }
    });
  });

  /* ---------- génération de la grille ---------- */
  function readConfig(){
    var figures = [];
    document.querySelectorAll('input[name="fig"]:checked').forEach(function(inp){
      figures.push(inp.value);
    });
    var lvl = document.querySelector('input[name="niveau"]:checked');
    var inf = measuresChoice === "inf";
    return {
      figures: figures,
      level: lvl ? parseInt(lvl.value, 10) : 1,
      meter: signature,
      // ∞ : le flux est généré par chunks de CHUNK_BARS avec ces réglages
      measures: inf ? CHUNK_BARS : parseInt(measuresChoice, 10),
      note: noteByLetter(noteChoice).abc,
      infinite: inf
    };
  }

  function clearShift(){
    shiftAt = 0;
  }

  /* Le flux garde toujours de quoi remplir la tranche rendue plus un chunk
     d'avance — appelé avant chaque rendu et à chaque image de lecture : la
     portée ne peut jamais « arriver » à l'écran. */
  function ensureStreamDepth(){
    var needBars = winStartBar + RENDER_LINES * perLine + CHUNK_BARS;
    while (streamBars.length < needBars) extendStream();
  }

  /* Étend le flux ∞ d'un chunk : mesures et timeline (temps globaux), et —
     lecture en cours — pousse les attaques correspondantes dans le tableau
     d'événements que la pompe du transport lit par référence. */
  function extendStream(){
    if (!window.BassRhythmGenerator || !streamCfg) return;
    var res = window.BassRhythmGenerator.generateExercise(streamCfg);
    var base = streamBeats;
    var added = [];
    for (var i = 0; i < res.bars.length; i++) streamBars.push(res.bars[i]);
    for (i = 0; i < res.notes.length; i++){
      var n = res.notes[i];
      var ev = {
        startBeats: base + n.startBeats,
        durationBeats: n.durationBeats,
        isRest: n.isRest,
        tiedToNext: n.tiedToNext
      };
      streamNotes.push(ev);
      added.push(ev);
    }
    streamBeats += res.bars.length * beatsPerBar();
    streamHeader = res.header;
    if (liveNoteEvents){
      var evs = window.BassRhythmEngine.noteSoundEvents(added);
      for (i = 0; i < evs.length; i++) liveNoteEvents.push(evs[i]);
    }
  }

  /* ---------- graine, URL partageable, copie ---------- */
  function randomSeed(){
    // Math.random ne sert qu'à TIRER la graine, jamais à fabriquer la grille
    // (celle-ci dérive de la graine via makeRng) : la grille reste reproductible.
    return Math.floor(Math.random() * 4294967296) >>> 0;
  }

  function shareState(){
    var cfg = readConfig();
    return {
      seed: currentSeed,
      figures: cfg.figures,
      level: cfg.level,
      meter: cfg.meter,
      note: noteChoice,       // lettre A–G ; la note ne change que la hauteur affichée, pas le rythme
      measures: measuresChoice // "4" | "8" | "16" | "inf"
    };
  }

  function shareHash(){
    // Grille composée : contenu complet (second format d'URL, cf. ADR 0001) ;
    // grille générée : graine + réglages.
    if (composedGrid){
      return "#" + window.BassRhythmGenerator.encodeComposed({
        meter: composedGrid.meter,
        note: noteChoice,
        events: composedGrid.events
      });
    }
    return "#" + window.BassRhythmGenerator.encodeShare(shareState());
  }

  function updateShareUrl(){
    if (!window.BassRhythmGenerator) return;
    var hash = shareHash();
    try {
      history.replaceState(null, "", hash); // même document : pas d'entrée d'historique, pas de saut de défilement
    } catch (e) {
      try { location.hash = hash.slice(1); } catch (e2) {} // repli si file:// refuse replaceState
    }
  }

  function showToast(msg){
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){ toastEl.classList.remove("show"); }, 1700);
  }

  function flashCopied(){
    if (!copyLinkBtn) return;
    copyLinkBtn.classList.add("copied");
    clearTimeout(flashCopied._t);
    flashCopied._t = setTimeout(function(){ copyLinkBtn.classList.remove("copied"); }, 1200);
  }

  /* Copie robuste : l'API Clipboard exige un contexte sécurisé (https/localhost),
     indisponible sur le http de GitHub Pages -> repli execCommand sur textarea.
     Retourne une promesse résolue en cas de succès, rejetée sinon. */
  function copyText(text){
    if (navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text).catch(function(){
        if (legacyCopy(text)) return;
        throw new Error("copie refusée");
      });
    }
    return legacyCopy(text) ? Promise.resolve() : Promise.reject(new Error("copie refusée"));
  }
  function legacyCopy(text){
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.top = "-1000px";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      var ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e){
      return false;
    }
  }

  function generateGrid(animate, seed){
    if (!window.BassRhythmGenerator) return false;
    var cfg = readConfig();
    composedGrid = null; // Générer produit une grille générée : le partage repasse en format graine
    // Graine imposée (restauration depuis l'URL) : reproduction exacte, sans
    // anti-doublon. Sinon graine tirée au sort à chaque génération.
    var fixed = (typeof seed === "number");
    try {
      clearShift();
      infiniteOn = !!cfg.infinite;
      if (infiniteOn){
        // Flux ∞ : UNE seule instance de rng, réutilisée à chaque tranche via
        // streamCfg (l'état avance) — flux déterministe ET varié depuis la graine.
        currentSeed = (fixed ? seed : randomSeed()) >>> 0;
        cfg.rng = window.BassRhythmGenerator.makeRng(currentSeed);
        streamCfg = cfg;
        streamBars = [];
        streamNotes = [];
        streamBeats = 0;
        winStartBar = 0;
        lastHeardBeat = 0;
        extendStream(); // le rendu remplit ensuite via ensureStreamDepth
        currentBars = null;
        currentHeader = "";
        TOTAL_BEATS = Infinity;
      } else {
        streamCfg = null;
        var res, s;
        if (fixed){
          s = seed >>> 0;
          cfg.rng = window.BassRhythmGenerator.makeRng(s);
          res = window.BassRhythmGenerator.generateExercise(cfg);
        } else {
          // Nouvelle graine à chaque essai : deux clics successifs donnent deux
          // grilles différentes, et la graine retenue rejoue exactement la
          // grille via un unique appel (clé de la reproductibilité).
          for (var i = 0; i < 8; i++){
            s = randomSeed();
            cfg.rng = window.BassRhythmGenerator.makeRng(s);
            res = window.BassRhythmGenerator.generateExercise(cfg);
            if (res.abc !== currentAbc) break;
          }
        }
        currentSeed = s >>> 0;
        currentAbc = res.abc;
        currentNotes = res.notes; // alimente l'allumage des notes (mode 2)
        currentBars = res.bars || null;     // re-découpage responsive (2 ou 4 mesures/système)
        currentHeader = res.header || "";
        TOTAL_BEATS = cfg.measures * beatsPerBar();
      }
      // Boucler un flux sans fin n'a pas de sens : l'emplacement du repeat
      // devient le témoin ∞ du mode (non cliquable).
      repeatBtn.classList.toggle("inf", infiniteOn);
      repeatBtn.disabled = infiniteOn;
      if (infiniteOn){
        repeatBtn.classList.remove("active");
        repeatBtn.removeAttribute("aria-pressed");
        repeatBtn.setAttribute("aria-label", "Exercice illimité — mesures générées en continu");
        repeatBtn.title = "Exercice illimité — mesures générées en continu";
      } else {
        repeatBtn.classList.toggle("active", repeatOn);
        repeatBtn.setAttribute("aria-pressed", String(repeatOn));
        repeatBtn.setAttribute("aria-label", "Boucler l'exercice");
        repeatBtn.title = "Boucler l'exercice";
      }
      updateExerciseTitle(cfg, animate); // l'en-tête suit chaque grille réellement affichée
      updateShareUrl(); // le hash de l'URL reflète la grille affichée (bookmarkable, prêt à copier)
      return true;
    } catch (err) {
      return false;
    }
  }

  /* ---------- actions ---------- */
  function regenerate(){
    stopAndReset();
    generateGrid(true);
    renderScore(true);
    computeLines();
    closeDrawer();
  }
  document.getElementById("generate-btn").addEventListener("click", regenerate);
  // « Revenir à une grille générée » : abandonne la grille composée et regénère
  // une grille classique (regenerate remet composedGrid à null et ferme le tiroir).
  document.getElementById("back-to-generated").addEventListener("click", regenerate);

  /* ---------- retour au début ----------
     En lecture : relance immédiate depuis le début de la grille, décompte
     d'une mesure inclus, par le chemin de lancement unique (startPlayback) —
     mode de guidage et tempo intacts, stop() du moteur coupe les nœuds
     actifs et annule les notes programmées (mêmes garanties que Rejouer).
     En pause : seul le point de reprise revient à 0 (play repartira de la
     mesure 1 avec décompte), la lecture reste suspendue. À l'arrêt (avant
     lecture ou après fin) : simple remise au repos des visuels et du statut,
     sans lancer la lecture. NB : une pause en mesure 1 mémorise déjà 0 —
     elle suit alors le même chemin que l'arrêt, sans rien perdre. */
  function rewindToStart(){
    clearShift();
    if (infiniteOn && winStartBar !== 0){
      // Flux ∞ : la fenêtre de rendu revient au début du flux déjà généré.
      winStartBar = 0;
      lastHeardBeat = 0;
      renderScore(false);
      computeLines();
    }
    if (playing){
      stopAndReset();
      startPlayback(0);
    } else if (pausedGridBeat > 0){
      pausedGridBeat = 0;
      followScoreLine(0, false);
    } else {
      stopAndReset();
    }
  }
  rewindBtn.addEventListener("click", rewindToStart);

  /* ---------- repeat : boucle sans couture (pas de nouveau décompte) ----------
     Armé, l'exercice reboucle sur lui-même à la barre finale ; coupé en vol,
     le cycle en cours se termine normalement. Sans objet en flux ∞ (masqué). */
  repeatBtn.addEventListener("click", function(){
    if (infiniteOn) return; // témoin ∞, pas une commande
    repeatOn = !repeatOn;
    repeatBtn.classList.toggle("active", repeatOn);
    repeatBtn.setAttribute("aria-pressed", String(repeatOn));
    if (playing && transport) transport.setLoop(repeatOn && !infiniteOn);
  });

  /* ---------- copier le lien de la grille ----------
     Le hash encode graine + réglages : le lien rejoue la grille exacte chez qui
     l'ouvre (l'appli hébergée le restaure au chargement). */
  copyLinkBtn.addEventListener("click", function(){
    updateShareUrl(); // garantit que location.href reflète la grille affichée
    copyText(location.href).then(function(){
      flashCopied();
      showToast("Lien copié");
    }, function(){
      showToast("copie impossible");
    });
  });

  /* ---------- tempo : saisie directe, ±5, molette, glisser vertical ---------- */
  playBtn.addEventListener("click", togglePlay);
  plus5.addEventListener("click", function(){ setBpm(bpm + 5); });
  minus5.addEventListener("click", function(){ setBpm(bpm - 5); });
  tempoNum.addEventListener("wheel", function(e){
    e.preventDefault();
    setBpm(bpm + (e.deltaY < 0 ? 1 : -1));
  }, { passive: false });

  /* Saisie directe : le champ n'accepte que des chiffres ; Entrée ou perte de
     focus valide (valeur clampée 40–200 par setBpm), Échap annule. Après
     validation, l'affichage est TOUJOURS resynchronisé sur bpm — y compris
     saisie vide ou hors bornes. */
  tempoNum.addEventListener("focus", function(){ tempoNum.select(); });
  tempoNum.addEventListener("click", function(){
    // le mouseup natif replace le caret après le select() du focus : on
    // re-sélectionne tout (sémantique « écraser la valeur »)
    if (document.activeElement === tempoNum) tempoNum.select();
  });
  tempoNum.addEventListener("input", function(){
    var clean = tempoNum.value.replace(/\D/g, "").slice(0, 3);
    if (clean !== tempoNum.value) tempoNum.value = clean;
  });
  tempoNum.addEventListener("keydown", function(e){
    if (e.key === "Enter"){ e.preventDefault(); tempoNum.blur(); }
    else if (e.key === "Escape"){ tempoNum.value = bpm; tempoNum.blur(); }
  });
  tempoNum.addEventListener("blur", function(){
    var v = parseInt(tempoNum.value, 10);
    if (!isNaN(v)) setBpm(v);
    tempoNum.value = bpm;
  });

  /* Glisser vertical pour ajuster ; un simple clic (course < 4 px) laisse le
     focus au champ pour la saisie clavier. Le drag ne s'arme qu'au-delà du
     seuil : il rend alors le focus et capture le pointeur. */
  (function(){
    var armed = false, dragging = false, startY = 0, startBpm = 60;
    tempoNum.addEventListener("pointerdown", function(e){
      armed = true; dragging = false; startY = e.clientY; startBpm = bpm;
    });
    tempoNum.addEventListener("pointermove", function(e){
      if (!armed) return;
      if (!dragging){
        if (Math.abs(e.clientY - startY) < 4) return;
        dragging = true;
        tempoNum.blur();
        tempoNum.setPointerCapture(e.pointerId);
      }
      setBpm(startBpm + Math.round((startY - e.clientY) / 3));
    });
    tempoNum.addEventListener("pointerup", function(){ armed = false; dragging = false; });
    tempoNum.addEventListener("pointercancel", function(){ armed = false; dragging = false; });
  })();

  document.addEventListener("keydown", function(e){
    if (e.code !== "Space") return;
    var t = e.target;
    if (t && (t.tagName === "INPUT" || t.tagName === "BUTTON" || t.tagName === "SELECT" || t.tagName === "TEXTAREA")) return;
    if (drawer.classList.contains("open")) return;
    if (composer.active) return; // en composition, la barre d'espace ne lance pas le lecteur
    e.preventDefault();
    togglePlay();
  });

  /* Resize / rotation : re-render si le découpage doit changer, ou si la
     gravure est à largeur native (staffwidth figé au rendu) ; la grille
     elle-même n'est jamais regénérée. Sinon, simple recalcul de géométrie
     (responsive:"resize" absorbe seul les variations de largeur en 4/ligne). */
  var resizeT = null;
  window.addEventListener("resize", function(){
    clearTimeout(resizeT);
    resizeT = setTimeout(function(){
      if (composer.active) buildComposerOverlays(); // la portée composée se recale sur la nouvelle largeur
      if (measuresPerLine() !== perLine || perLine === 2) renderScore(false);
      computeLines();
    }, 200);
  });

  /* ---------- restauration d'une grille depuis l'URL ---------- */
  function setPill(containerId, value){
    var box = document.getElementById(containerId);
    box.querySelectorAll("input").forEach(function(inp){ inp.checked = (inp.value === value); });
    box.querySelectorAll(".pill").forEach(function(p){
      p.classList.toggle("checked", p.querySelector("input").checked);
    });
  }

  /* Applique aux réglages l'état décodé du hash (les mêmes variables et classes
     visuelles que les gestionnaires manuels), sans regénérer : la génération
     suit avec la graine imposée. */
  function applyState(st){
    // figures : cases à cocher (état visuel géré en CSS via :checked)
    document.querySelectorAll('input[name="fig"]').forEach(function(inp){
      inp.checked = st.figures.indexOf(inp.value) !== -1;
    });
    // niveau : radio + classe .checked du libellé
    var lvl = document.querySelector('input[name="niveau"][value="' + st.level + '"]');
    if (lvl) lvl.checked = true;
    document.querySelectorAll('.levels .level').forEach(function(l){
      l.classList.toggle("checked", l.querySelector("input").checked);
    });
    // signature / note / mesures : pastilles + variables d'état
    setPill("sig-pills", st.meter);    signature = st.meter;
    setPill("note-pills", st.note);    noteChoice = st.note;
    setPill("mes-pills", st.measures); measuresChoice = st.measures;
  }

  /* Le hash peut porter DEUX formats : contenu complet (grille composée) ou
     graine + réglages (grille générée). On détecte lequel — le codec du
     mauvais format rend null — et on rejette silencieusement un lien invalide
     (démarrage normal). */
  function readShareFromHash(){
    if (!window.BassRhythmGenerator) return null;
    var raw = (location.hash || "").replace(/^#/, "");
    if (!raw) return null;
    var comp = window.BassRhythmGenerator.decodeComposed(raw);
    if (comp) return { kind: "composed", state: comp };
    var st = window.BassRhythmGenerator.decodeShare(raw);
    if (st){ applyState(st); return { kind: "seed", state: st }; }
    return null;
  }

  /* ==================================================================== */
  /* Mode Composer — construction manuelle d'une grille (grille composée).  */
  /* ==================================================================== */

  var COMPOSER_METERS = ["2/4", "3/4", "4/4", "2/2", "3/2", "4/2"];
  var COMPOSER_FIGS = ["ronde", "blanche", "noire", "croche", "double", "triple", "quadruple"];
  var FIG_NAMES = {
    ronde: "Ronde", blanche: "Blanche", noire: "Noire", croche: "Croche",
    double: "Double", triple: "Triple", quadruple: "Quadruple"
  };
  /* Noms propres des silences (solfège) : chaque silence a son nom, distinct de
     la figure de note de même durée. */
  var REST_NAMES = {
    ronde: "Pause", blanche: "Demi-pause", noire: "Soupir", croche: "Demi-soupir",
    double: "Quart de soupir", triple: "Huitième de soupir", quadruple: "Seizième de soupir"
  };
  var COMPOSER_EPSILON = 1e-6;

  /* Glyphes des figures : on réutilise les images déjà présentes dans les
     réglages (chemin en version dossier, data URI dans le fichier unique) —
     ainsi la palette n'introduit aucune nouvelle référence externe. */
  var FIG_SRC = {};
  document.querySelectorAll(".figs .fig").forEach(function(lbl){
    var inp = lbl.querySelector("input");
    var img = lbl.querySelector("img");
    if (inp && img) FIG_SRC[inp.value] = img.getAttribute("src");
  });

  /* État du Composer. measures : chaque mesure est une liste d'événements
     « riches » { fig, rest, dot, tie } ; la DERNIÈRE mesure est toujours la
     mesure ouverte (partielle ou vide). L'invariant — toute mesure pleine vaut
     exactement la signature — est rétabli après chaque mutation par
     normalizeComposer(). La composition persiste pendant la session (rouvrir
     le tiroir ne l'efface pas). */
  var composer = {
    active: false,
    meter: "4/4",
    measures: [[]],
    families: { silences: false, modif: false },
    selection: null
  };

  var composerBtn = document.getElementById("composer-btn");
  var composerDrawer = document.getElementById("composer-drawer");

  /* ---------- durées et invariant (logique pure) ---------- */
  function composerDen(){ return parseInt(composer.meter.split("/")[1], 10); }
  function composerBeats(){ return parseInt(composer.meter.split("/")[0], 10); }
  function figBeats(fig, dot){
    return window.BassRhythmGenerator.figureBeats(fig, composerDen(), dot);
  }
  function eventDur(ev){ return figBeats(ev.fig, ev.dot); }
  function measSum(m){
    var s = 0;
    for (var i = 0; i < m.length; i++) s += eventDur(m[i]);
    return s;
  }
  function openMeasure(){ return composer.measures[composer.measures.length - 1]; }
  function composerRemaining(){ return composerBeats() - measSum(openMeasure()); }
  function fullMeasureCount(){ return composer.measures.length - 1; }
  function lastPlacedEvent(){
    for (var i = composer.measures.length - 1; i >= 0; i--){
      var m = composer.measures[i];
      if (m.length) return m[m.length - 1];
    }
    return null;
  }
  /* Place restante dans la mesure qui contient la dernière note posée (0 si
     cette note ferme déjà sa mesure — le point n'y tient alors pas). */
  function remainingOfLast(){
    for (var i = composer.measures.length - 1; i >= 0; i--){
      if (composer.measures[i].length){
        return composerBeats() - measSum(composer.measures[i]);
      }
    }
    return composerBeats();
  }
  function pendingTie(){
    var e = lastPlacedEvent();
    return !!(e && e.tie && !e.rest);
  }
  function fitsFigure(fig){ return figBeats(fig, false) <= composerRemaining() + COMPOSER_EPSILON; }

  /* Rétablit l'invariant : re-répartit tous les événements en mesures pleines
     (remplissage strict, chaque mesure close pile sur la signature) suivies
     d'une mesure ouverte (le reste, éventuellement vide). Après n'importe
     quelle mutation, l'état reste toujours valide — jamais de mesure à moitié
     pleine gravée de travers. */
  function normalizeComposer(){
    var flat = [];
    var i, j;
    for (i = 0; i < composer.measures.length; i++){
      for (j = 0; j < composer.measures[i].length; j++) flat.push(composer.measures[i][j]);
    }
    var out = [];
    var bar = [];
    var sum = 0;
    var beats = composerBeats();
    for (i = 0; i < flat.length; i++){
      bar.push(flat[i]);
      sum += eventDur(flat[i]);
      if (Math.abs(sum - beats) < COMPOSER_EPSILON){ out.push(bar); bar = []; sum = 0; }
    }
    out.push(bar); // mesure ouverte
    composer.measures = out;
  }

  /* ---------- pose et modificateurs ---------- */
  function placeFigure(fig, isRest){
    if (isRest && pendingTie()) return; // on ne lie pas vers un silence
    if (!fitsFigure(fig)) return;       // ne rentre pas dans la place restante
    openMeasure().push({ fig: fig, rest: !!isRest, dot: false, tie: false });
    composer.selection = null;
    normalizeComposer();
    refreshComposer();
  }
  function backspaceComposer(){
    var ms = composer.measures;
    var open = ms[ms.length - 1];
    if (!open.length){
      if (ms.length === 1) return; // grille vide
      ms.pop();
      open = ms[ms.length - 1];
    }
    open.pop();
    composer.selection = null;
    normalizeComposer();
    refreshComposer();
  }
  function clearComposer(){
    composer.measures = [[]];
    composer.selection = null;
    refreshComposer();
  }
  function setComposerMeter(v){
    if (v === composer.meter) return;
    if (fullMeasureCount() > 0 || openMeasure().length){
      if (!window.confirm("Changer la signature réinitialise la grille composée. Continuer ?")) return;
    }
    composer.meter = v;
    composer.measures = [[]];
    composer.selection = null;
    refreshComposer();
  }
  /* Point : allonge la dernière note de moitié (bascule). Grisé si la dernière
     n'est pas une note, ou si le demi-temps supplémentaire ne rentre pas. */
  function pointState(){
    var e = lastPlacedEvent();
    if (!e || e.rest) return { on: false, disabled: true };
    if (e.dot) return { on: true, disabled: false };
    var fits = figBeats(e.fig, false) * 0.5 <= remainingOfLast() + COMPOSER_EPSILON;
    return { on: false, disabled: !fits };
  }
  function togglePoint(){
    var st = pointState();
    if (st.disabled) return;
    var e = lastPlacedEvent();
    e.dot = !e.dot;
    normalizeComposer();
    refreshComposer();
  }
  /* Liaison : la dernière note est liée à la suivante (bascule). Grisée si la
     dernière n'est pas une note. */
  function tieState(){
    var e = lastPlacedEvent();
    if (!e || e.rest) return { on: false, disabled: true };
    return { on: !!e.tie, disabled: false };
  }
  function toggleTie(){
    var e = lastPlacedEvent();
    if (!e || e.rest) return;
    e.tie = !e.tie;
    refreshComposer();
  }

  /* ---------- duplication de plage (sélection sur la portée) ---------- */
  function cloneMeasure(m){
    return m.map(function(e){ return { fig: e.fig, rest: e.rest, dot: e.dot, tie: e.tie }; });
  }
  function selectComposerRange(a, b){
    composer.selection = { start: Math.min(a, b), end: Math.max(a, b) };
  }
  function inComposerSel(i){
    return composer.selection && i >= composer.selection.start && i <= composer.selection.end;
  }
  function dupComposerHere(){
    if (!composer.selection) return;
    var s = composer.selection, copies = [], i;
    for (i = s.start; i <= s.end; i++) copies.push(cloneMeasure(composer.measures[i]));
    Array.prototype.splice.apply(composer.measures, [s.end + 1, 0].concat(copies));
    composer.selection = { start: s.end + 1, end: s.end + copies.length };
    normalizeComposer();
    refreshComposer();
  }
  function dupComposerEnd(){
    if (!composer.selection) return;
    var s = composer.selection, copies = [], i;
    for (i = s.start; i <= s.end; i++) copies.push(cloneMeasure(composer.measures[i]));
    var at = fullMeasureCount(); // insérer juste avant la mesure ouverte
    Array.prototype.splice.apply(composer.measures, [at, 0].concat(copies));
    composer.selection = { start: at, end: at + copies.length - 1 };
    normalizeComposer();
    refreshComposer();
  }
  function delComposerSel(){
    if (!composer.selection) return;
    var s = composer.selection;
    composer.measures.splice(s.start, s.end - s.start + 1);
    if (!composer.measures.length) composer.measures = [[]];
    composer.selection = null;
    normalizeComposer();
    refreshComposer();
  }

  /* ---------- gravure en direct (mêmes options que la vue de jeu) ---------- */
  function toDModel(measures){
    return measures.map(function(m){
      return m.map(function(ev){ return { d: eventDur(ev), rest: ev.rest, tie: ev.tie }; });
    });
  }
  function sumD(m){
    var s = 0;
    for (var i = 0; i < m.length; i++) s += m[i].d;
    return s;
  }
  function composerAbc(){
    var G = window.BassRhythmGenerator;
    var den = composerDen(), beats = composerBeats();
    var noteTok = noteByLetter(noteChoice).abc;
    var dModel = toDModel(composer.measures);
    var unit = G.chooseUnit(dModel, den);
    var lden = 64 / unit;
    var bars = dModel.map(function(m, mi){
      var t = G.barText(m, unit, den, noteTok);
      if (mi === dModel.length - 1){
        // mesure ouverte : la partie vide est comblée par un silence invisible
        var rem = beats - sumD(m);
        if (rem > COMPOSER_EPSILON){
          var mu = Math.round(rem * 64 / den) / unit;
          t = (t ? t + " " : "") + "x" + (mu === 1 ? "" : mu);
        } else if (!t){
          t = "x" + (Math.round(beats * 64 / den) / unit);
        }
      }
      return t;
    });
    // La mesure ouverte garde une liaison PENDANTE (arc vers le silence
    // invisible) comme repère visuel « la prochaine note sera liée » ; à Jouer,
    // assembleComposed la neutralise (une liaison sans cible ne se joue pas).
    return G.abcHeader(composer.meter, lden) + G.joinBars(bars, 4);
  }
  function renderComposerStaff(){
    var el = document.getElementById("composer-staff");
    if (!el) return;
    if (!window.ABCJS){
      el.innerHTML = '<div class="score-fallback">La partition n’a pas pu se charger.</div>';
      return;
    }
    ABCJS.renderAbc(el, composerAbc(), { add_classes: true, responsive: "resize" });
    // la ligne en travail reste centrée et s'écarte depuis le centre au fur et
    // à mesure du remplissage (même helper que la vue de jeu)
    centerStaffSvg(el.querySelector("svg"));
    buildComposerOverlays();
  }

  /* ---------- zones de sélection + barrette flottante ---------- */
  function composerMeasureEls(svg, i){
    var direct = svg.querySelectorAll(".abcjs-mm" + i);
    if (direct.length) return direct;
    var line = Math.floor(i / 4), within = i % 4;
    return svg.querySelectorAll(".abcjs-l" + line + ".abcjs-m" + within);
  }
  function buildComposerOverlays(){
    var layer = document.getElementById("composer-overlay");
    if (!layer) return;
    layer.innerHTML = "";
    var svg = document.querySelector("#composer-staff svg");
    if (!svg) return;
    var base = layer.getBoundingClientRect();
    for (var i = 0; i < fullMeasureCount(); i++){
      var els = composerMeasureEls(svg, i);
      if (!els.length) continue;
      var l = 1e9, r = -1e9, t = 1e9, b = -1e9;
      els.forEach(function(e){
        var bb = e.getBoundingClientRect();
        l = Math.min(l, bb.left); r = Math.max(r, bb.right);
        t = Math.min(t, bb.top); b = Math.max(b, bb.bottom);
      });
      var z = document.createElement("div");
      z.className = "measure-zone" + (inComposerSel(i) ? " sel" : "");
      z.dataset.mm = i;
      z.style.left = (l - base.left - 5) + "px";
      z.style.width = (r - l + 10) + "px";
      z.style.top = (t - base.top - 6) + "px";
      z.style.height = (b - t + 12) + "px";
      layer.appendChild(z);
    }
    placeComposerFloatbar();
  }
  function placeComposerFloatbar(){
    var host = document.getElementById("composer-stage");
    if (!host) return;
    var old = host.querySelector(".float-bar");
    if (old) old.remove();
    if (!composer.selection) return;
    var sel = [].slice.call(document.querySelectorAll("#composer-overlay .measure-zone.sel"));
    if (!sel.length) return;
    var l = 1e9, r = -1e9, t = 1e9;
    sel.forEach(function(e){
      var bb = e.getBoundingClientRect();
      l = Math.min(l, bb.left); r = Math.max(r, bb.right); t = Math.min(t, bb.top);
    });
    var hb = host.getBoundingClientRect();
    var n = composer.selection.end - composer.selection.start + 1;
    var atEnd = composer.selection.end === fullMeasureCount() - 1;
    var bar = document.createElement("div");
    bar.className = "float-bar";
    bar.innerHTML =
      '<span class="float-bar-label">' + (n > 1 ? n + " mesures" : "1 mesure") + '</span>' +
      '<button type="button" data-cact="dup-here">Dupliquer à droite</button>' +
      (atEnd ? "" : '<button type="button" data-cact="dup-end">Dupliquer à la fin</button>') +
      '<span class="sep"></span>' +
      '<button type="button" data-cact="del">Supprimer</button>';
    bar.style.left = Math.max(120, (l + r) / 2 - hb.left) + "px";
    bar.style.top = (t - hb.top) + "px";
    host.appendChild(bar);
  }
  function updateComposerSelectionVisual(){
    document.querySelectorAll("#composer-overlay .measure-zone").forEach(function(z){
      z.classList.toggle("sel", inComposerSel(+z.dataset.mm));
    });
    placeComposerFloatbar();
  }

  /* ---------- fragments du tiroir ---------- */
  function setHTMLById(id, html){
    var el = document.getElementById(id);
    if (el) el.innerHTML = html;
  }
  function composerSigPillsHTML(){
    return COMPOSER_METERS.map(function(k){
      return '<button type="button" class="pill' + (k === composer.meter ? " checked" : "") +
        '" data-csig="' + k + '"><span class="frac">' + k + '</span></button>';
    }).join("");
  }
  function composerFamiliesHTML(){
    var f = composer.families;
    return '<button type="button" class="fam on" data-cfam="notes" aria-pressed="true" disabled>Notes</button>' +
      '<button type="button" class="fam' + (f.silences ? " on" : "") + '" data-cfam="silences" aria-pressed="' + f.silences + '">Silences</button>' +
      '<button type="button" class="fam' + (f.modif ? " on" : "") + '" data-cfam="modif" aria-pressed="' + f.modif + '">Modificateurs</button>';
  }
  /* Glyphe de silence : la palette n'a pas d'images de silence (seulement des
     notes) ; on grave le vrai symbole de repos avec abcjs — le même moteur que
     la portée — puis on retire les lignes de portée et on resserre le viewBox
     sur le seul glyphe. Rendu une fois par figure, mémoïsé. Aucune ressource
     externe ajoutée : abcjs est déjà embarqué. */
  var restGlyphCache = {};
  function restGlyphSvg(fig){
    if (restGlyphCache.hasOwnProperty(fig)) return restGlyphCache[fig];
    var svg = "";
    if (window.ABCJS && window.BassRhythmGenerator){
      var n64 = window.BassRhythmGenerator.figureBeats(fig, 64, false);
      var tmp = document.createElement("div");
      tmp.style.cssText = "position:absolute;left:-9999px;top:0";
      document.body.appendChild(tmp);
      try {
        window.ABCJS.renderAbc(tmp, "X:1\nL:1/64\nK:C clef=none\nz" + n64, { add_classes: true });
        var s = tmp.querySelector("svg");
        if (s){
          s.querySelectorAll(".abcjs-staff, style, title").forEach(function(e){ e.remove(); });
          var rest = s.querySelector(".abcjs-rest");
          if (rest){
            var bb = rest.getBBox();
            var pad = 4;
            s.setAttribute("viewBox", (bb.x - pad) + " " + (bb.y - pad) + " " + (bb.width + pad * 2) + " " + (bb.height + pad * 2));
            s.setAttribute("preserveAspectRatio", "xMidYMid meet");
            s.removeAttribute("width");
            s.removeAttribute("height");
            svg = s.outerHTML;
          }
        }
      } catch (e){ svg = ""; }
      document.body.removeChild(tmp);
    }
    restGlyphCache[fig] = svg;
    return svg;
  }
  function composerItemHTML(fig, isRest){
    var ok = fitsFigure(fig) && !(isRest && pendingTie());
    var glyph = isRest
      ? '<span class="palette-glyph palette-rest">' + restGlyphSvg(fig) + '</span>'
      : '<img class="palette-glyph" src="' + (FIG_SRC[fig] || "") + '" alt="">';
    var label = isRest ? REST_NAMES[fig] : FIG_NAMES[fig];
    return '<button type="button" class="palette-item" data-cfig="' + fig + '" data-crest="' + isRest + '"' +
      (ok ? "" : " disabled") + '>' +
      glyph +
      '<span class="palette-label">' + label + '</span></button>';
  }
  function composerPaletteHTML(){
    var html = '<div class="palette-group"><div class="palette-family">Notes</div><div class="palette-items">';
    var i;
    for (i = 0; i < COMPOSER_FIGS.length; i++) html += composerItemHTML(COMPOSER_FIGS[i], false);
    html += '</div></div>';
    if (composer.families.silences){
      html += '<div class="palette-group"><div class="palette-family">Silences</div><div class="palette-items">';
      for (i = 0; i < COMPOSER_FIGS.length; i++) html += composerItemHTML(COMPOSER_FIGS[i], true);
      html += '</div></div>';
    }
    if (composer.families.modif){
      var pt = pointState(), ti = tieState();
      html += '<div class="palette-group"><div class="palette-family">Modificateurs</div><div class="palette-items">' +
        '<button type="button" class="palette-item mod' + (pt.on ? " on" : "") + '" data-cmod="dot"' +
          (pt.disabled ? " disabled" : "") + ' aria-pressed="' + pt.on + '">' +
          '<span class="mod-glyph">•</span><span class="palette-label">Note<br>pointée</span></button>' +
        '<button type="button" class="palette-item mod' + (ti.on ? " on" : "") + '" data-cmod="tie"' +
          (ti.disabled ? " disabled" : "") + ' aria-pressed="' + ti.on + '">' +
          '<span class="mod-glyph">⌢</span><span class="palette-label">Lier à<br>la suivante</span></button>' +
        '</div></div>';
    }
    return html;
  }
  function round2(x){ return Math.round(x * 100) / 100; }
  function composerReadoutHTML(){
    var placed = round2(measSum(openMeasure()));
    var total = composerBeats();
    var rem = round2(composerRemaining());
    var extra = pendingTie() ? ' · <b>liaison en attente</b>' : "";
    return "Mesure en cours : <b>" + placed + " / " + total + "</b> temps · reste <b>" + rem + "</b>" + extra;
  }
  function updateComposerMeta(){
    var el = document.getElementById("composer-meta");
    if (el) el.textContent = composer.meter + " · " + fullMeasureCount() + " mesure(s)";
  }
  function updateComposerPlayEnabled(){
    var btn = document.getElementById("composer-play");
    if (btn) btn.disabled = fullMeasureCount() === 0;
  }
  function refreshComposer(){
    setHTMLById("composer-sig-pills", composerSigPillsHTML());
    setHTMLById("composer-families", composerFamiliesHTML());
    setHTMLById("composer-palette", composerPaletteHTML());
    setHTMLById("composer-readout", composerReadoutHTML());
    updateComposerMeta();
    updateComposerPlayEnabled();
    renderComposerStaff();
  }

  /* ---------- ouverture / fermeture du mode ---------- */
  function openComposer(){
    closeDrawer(); // les deux tiroirs ne s'ouvrent jamais ensemble
    if (playing) pausePlayback();
    composer.active = true;
    document.body.classList.add("composing");
    composerDrawer.classList.add("open");
    composerDrawer.setAttribute("aria-hidden", "false");
    composerBtn.setAttribute("aria-expanded", "true");
    refreshComposer();
    setTimeout(buildComposerOverlays, 560); // overlays recalés une fois la scène élargie
  }
  function closeComposer(){
    if (!composer.active){
      composerDrawer.classList.remove("open");
      return;
    }
    returnFocus(composerDrawer, composerBtn); // avant aria-hidden
    composer.active = false;
    document.body.classList.remove("composing");
    composerDrawer.classList.remove("open");
    composerDrawer.setAttribute("aria-hidden", "true");
    composerBtn.setAttribute("aria-expanded", "false");
    composer.selection = null;
  }
  function toggleComposer(){
    if (composer.active) closeComposer();
    else openComposer();
  }

  /* ---------- Jouer : charger la grille composée dans le lecteur ---------- */
  function flattenMeasures(ms){
    var f = [], i, j;
    for (i = 0; i < ms.length; i++) for (j = 0; j < ms[i].length; j++) f.push(ms[i][j]);
    return f;
  }
  function loadComposedIntoPlayer(artifact, meta, autoplay){
    stopAndReset();
    closeComposer();
    infiniteOn = false;
    streamCfg = null;
    composedGrid = meta; // { meter, events, measures }
    signature = meta.meter;
    setPill("sig-pills", signature);
    currentAbc = artifact.abc;
    currentNotes = artifact.notes;
    currentBars = artifact.bars;
    currentHeader = artifact.header;
    TOTAL_BEATS = meta.measures.length * parseInt(meta.meter.split("/")[0], 10);
    // Grille finie : jamais de flux ∞ ; le repeat redevient une commande.
    repeatBtn.classList.remove("inf");
    repeatBtn.disabled = false;
    repeatBtn.classList.toggle("active", repeatOn);
    repeatBtn.setAttribute("aria-pressed", String(repeatOn));
    repeatBtn.setAttribute("aria-label", "Boucler l'exercice");
    repeatBtn.title = "Boucler l'exercice";
    exTitle.textContent = "grille composée";
    buildBeats();
    renderScore(true);
    computeLines();
    updateShareUrl();
    if (autoplay) startPlayback(0);
  }
  function composerPlay(){
    if (!window.BassRhythmGenerator || fullMeasureCount() === 0) return;
    var full = composer.measures.slice(0, fullMeasureCount());
    var dModel = toDModel(full);
    var artifact;
    try {
      artifact = window.BassRhythmGenerator.assembleComposed(dModel, {
        meter: composer.meter, note: noteByLetter(noteChoice).abc
      });
    } catch (e){ return; }
    var richFull = full.map(cloneMeasure);
    loadComposedIntoPlayer(artifact, {
      meter: composer.meter,
      events: flattenMeasures(richFull),
      measures: richFull
    }, true);
  }
  /* Restaure une grille composée depuis un lien : composition en mémoire +
     chargement dans le lecteur (prête à jouer, sans démarrer). */
  function restoreComposedFromShare(state){
    noteChoice = state.note;
    setPill("note-pills", state.note);
    composer.meter = state.meter;
    var full = state.measures.map(function(bar){
      return bar.map(function(e){ return { fig: e.fig, rest: !!e.rest, dot: !!e.dot, tie: !!e.tie }; });
    });
    composer.measures = full.map(cloneMeasure);
    composer.measures.push([]); // mesure ouverte
    composer.selection = null;
    var artifact = window.BassRhythmGenerator.assembleComposed(toDModel(full), {
      meter: composer.meter, note: noteByLetter(noteChoice).abc
    });
    loadComposedIntoPlayer(artifact, {
      meter: composer.meter,
      events: flattenMeasures(full),
      measures: full
    }, false);
  }

  /* ---------- câblage des événements du Composer ---------- */
  composerBtn.addEventListener("click", toggleComposer);
  document.getElementById("composer-close-btn").addEventListener("click", closeComposer);
  document.getElementById("composer-play").addEventListener("click", composerPlay);
  document.getElementById("composer-backspace").addEventListener("click", backspaceComposer);
  document.getElementById("composer-clear").addEventListener("click", clearComposer);

  composerDrawer.addEventListener("click", function(e){
    var el;
    if ((el = e.target.closest("[data-cfig]"))){
      if (!el.disabled) placeFigure(el.dataset.cfig, el.dataset.crest === "true");
      return;
    }
    if ((el = e.target.closest("[data-cmod]"))){
      if (el.disabled) return;
      if (el.dataset.cmod === "dot") togglePoint();
      else toggleTie();
      return;
    }
    if ((el = e.target.closest("[data-cfam]"))){
      if (el.dataset.cfam === "notes") return;
      composer.families[el.dataset.cfam] = !composer.families[el.dataset.cfam];
      refreshComposer();
      return;
    }
    if ((el = e.target.closest("[data-csig]"))){
      setComposerMeter(el.dataset.csig);
      return;
    }
  });

  /* Sélection de plage sur la portée : clic = ancre, glisser ou maj+clic
     étend la plage contiguë ; clic en dehors de la sélection en sort. */
  var composerDrag = { on: false, anchor: 0 };
  document.addEventListener("mousedown", function(e){
    if (!composer.active) return;
    if (e.target.closest(".float-bar")) return; // laisser agir les boutons de la barrette
    var z = e.target.closest("#composer-overlay .measure-zone");
    if (z){
      var idx = +z.dataset.mm;
      if (e.shiftKey){
        selectComposerRange(composerDrag.anchor, idx);
      } else {
        composerDrag.on = true;
        composerDrag.anchor = idx;
        selectComposerRange(idx, idx);
      }
      updateComposerSelectionVisual();
      return;
    }
    if (composer.selection){ composer.selection = null; updateComposerSelectionVisual(); }
  });
  document.addEventListener("mouseover", function(e){
    if (!composer.active || !composerDrag.on) return;
    var z = e.target.closest("#composer-overlay .measure-zone");
    if (!z) return;
    selectComposerRange(composerDrag.anchor, +z.dataset.mm);
    updateComposerSelectionVisual();
  });
  document.addEventListener("mouseup", function(){ composerDrag.on = false; });
  document.addEventListener("click", function(e){
    if (!composer.active) return;
    var b = e.target.closest(".float-bar [data-cact]");
    if (!b) return;
    var a = b.dataset.cact;
    if (a === "dup-here") dupComposerHere();
    else if (a === "dup-end") dupComposerEnd();
    else if (a === "del") delComposerSel();
  });
  document.addEventListener("keydown", function(e){
    if (!composer.active || e.key !== "Backspace") return;
    var t = e.target;
    if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
    e.preventDefault();
    backspaceComposer();
  });

  /* ---------- init ---------- */
  var restored = readShareFromHash(); // grille partagée dans l'URL -> réglages restaurés
  if (restored && restored.kind === "composed"){
    restoreComposedFromShare(restored.state); // grille composée : contenu complet restauré
  } else {
    generateGrid(false, restored ? restored.state.seed : undefined); // la partition affichée au chargement est déjà une grille générée
    renderScore(false);
    computeLines();      // fenêtre téléprompteur dimensionnée dès le chargement
  }
  buildBeats();
})();
</script>
</body>
</html>
